version: '3.8'

services:
  # Distributed Task Message Broker
  redis:
    image: redis:7.2-alpine
    container_name: sim_broker_core
    ports:
      - "6379:6379"
    networks:
      - sim_fabric_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI Gateway Endpoint Router
  api:
    build:
      context: .
      target: runner
    container_name: sim_gateway_api
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # Pass through your native environment key
      - CONTAINER_DATA_PATH=${CONTAINER_DATA_PATH}
      - STORAGE_QUOTA_MB=${STORAGE_QUOTA_MB}
      - DEV_MODE=${DEV_MODE}
    volumes:
      # Bind your local machine's directory to your exact /app/data target
      - ${HOST_DATA_PATH}:${CONTAINER_DATA_PATH}
    networks:
      - sim_fabric_net
    depends_on:
      redis:
        condition: service_healthy

  # Parallel Task Execution Worker Node
  worker:
    build:
      context: .
      target: runner
    container_name: sim_compute_worker
    command: python -m celery -A app.workers.celery_app worker --loglevel=info -c 4
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CONTAINER_DATA_PATH=${CONTAINER_DATA_PATH}
      - STORAGE_QUOTA_MB=${STORAGE_QUOTA_MB}
    volumes:
      - ${HOST_DATA_PATH}:${CONTAINER_DATA_PATH}
    networks:
      - sim_fabric_net
    depends_on:
      redis:
        condition: service_healthy

networks:
  sim_fabric_net:
    driver: bridge
