version: '3.8'

services:
  # 1. The Message Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 2. The FastAPI Web Server
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./user_workspace:${CONTAINER_DATA_PATH}
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  # 3. The Background Simulation Worker
  worker:
    build: .
    # This command starts Celery instead of the web server
    command: celery -A app.main.celery_app worker --loglevel=info
    volumes:
      # The worker ALSO needs access to the mounted files to read inputs and write outputs
      - ./user_workspace:${CONTAINER_DATA_PATH}
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
