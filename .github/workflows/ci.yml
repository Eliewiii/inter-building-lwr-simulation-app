name: CI - SimGateway-LWR Hybrid Pipeline

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "src/**"
      - "app/**"
      - "tests/**"
      - "Dockerfile"
      - "docker-compose.yml"
  pull_request:
    branches: [main]

jobs:
  # PHASE 1: Fast Host-Side Validation
  fast-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install Dependencies
        run: |
          pip install .
          pip install -r requirements.txt
      # Linter
      - name: Run Linter (Ruff)
        run: ruff check .
      # Type Checker
      - name: Run Pyright
        uses: jakebailey/pyright-action@v2
        with:
          annotate: all
          warnings: false
          lib: false
      # Test Runner (Pytest)
      - name: Run Tests (Pytest)
        run: pytest -m "not system and not debug and not simulation"

  # PHASE 2: Heavy Containerized Integration
  container-integration:
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Define Storage Path
        run: |
          # Create the path and save it to the environment file so 
          # all subsequent steps can access it as an environment variable
          echo "HOST_DATA_PATH=${{ runner.temp }}/storage" >> $GITHUB_ENV
          mkdir -p ${{ runner.temp }}/storage

      - name: Build Stack
        run: docker compose build

      - name: Start Services
        run: HOST_DATA_PATH=$HOST_DATA_PATH docker compose up -d

      - name: Run Integration Tests
        run: docker compose exec -T api python -m pytest tests/integration

